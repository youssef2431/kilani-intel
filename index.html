<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KILANI INTEL | Hybrid Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #D4AF37;
            --dark-bg: #050505;
            --card-bg: #111111;
            --glass: rgba(212, 175, 55, 0.1);
            --secure-green: #00ff88;
        }

        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        nav {
            background: rgba(0, 0, 0, 0.9);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--glass);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--primary-gold);
            font-weight: bold;
            letter-spacing: 2px;
        }

        .market-ticker {
            background: #000;
            padding: 10px 0;
            border-bottom: 1px solid var(--glass);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            overflow: hidden;
            position: relative;
        }

        .ticker-wrap {
            display: inline-block;
            white-space: nowrap;
            padding-left: 100%;
            animation: ticker 30s linear infinite;
        }

        @keyframes ticker {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        .master-grid {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 25px;
            padding: 25px;
            max-width: 1600px;
            margin: auto;
        }

        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--glass);
        }

        .metric-value {
            font-size: 2.2rem;
            color: var(--secure-green);
            font-family: 'Orbitron', sans-serif;
            margin: 15px 0;
        }

        .btn-gold {
            background: var(--primary-gold);
            color: #000;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            width: 100%;
            transition: 0.3s;
        }

        .btn-gold:hover { opacity: 0.8; }

        #chat-container {
            height: 350px;
            overflow-y: auto;
            background: #080808;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid #222;
        }

        .chat-msg { margin-bottom: 10px; font-size: 0.9rem; border-bottom: 1px solid #1a1a1a; padding-bottom: 5px; }
        .chat-msg b { color: var(--primary-gold); }

        .input-group { display: flex; gap: 10px; }
        input {
            flex-grow: 1;
            background: #1a1a1a;
            border: 1px solid var(--glass);
            color: #fff;
            padding: 12px;
            border-radius: 6px;
            outline: none;
        }

        @media (max-width: 900px) { .master-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="market-ticker">
    <div class="ticker-wrap">
        BTC/USD: $67,432.10 ▲ | ETH/USD: $3,481.50 ▲ | GOLD: $2,388.20 ▲ | VIX: 14.22 ▼ | NASDAQ: 18,203.40 ▲
    </div>
</div>

<nav>
    <div class="logo">KILANI INTEL</div>
    <button class="btn-gold" style="width:auto">System Access</button>
</nav>

<div class="master-grid">
    <aside>
        <div class="card">
            <h4 style="color: var(--primary-gold); margin: 0;">Intelligence Score</h4>
            <div class="metric-value" id="live-score">97.8%</div>
            <p style="font-size: 0.8rem; color: #777;">AI Confidence Score</p>
            <hr style="border:0; border-top:1px solid #222; margin:20px 0;">
            <p style="font-size: 0.85rem;">Status: <span style="color: var(--secure-green)">Encrypted</span></p>
            <p style="font-size: 0.85rem;">Connection: <span style="color: var(--primary-gold)">Secure</span></p>
        </div>
    </aside>

    <main>
        <div class="card">
            <h3 style="margin-top:0; color: var(--primary-gold)">Secure Command Chat</h3>
            <div id="chat-container"></div>
            <div class="input-group">
                <input type="text" id="user-input" placeholder="Enter secure command...">
                <button class="btn-gold" style="width:100px" onclick="sendMessage()">Execute</button>
            </div>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // الإعدادات - تأكد من استخدام الـ Anon Key الصحيح
    const CONFIG = {
        SUPABASE_URL: 'https://fqplhqwkayssrnnaralw.supabase.co',
        SUPABASE_KEY: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZxcWxocXdreXNzcm5uYXJhbHciLCJyb2xlIjoiYW5vbiIsImlhdCI6MTcxNDM4MTg0NywiZXhwIjoyMDMwMTA3ODQ3fQ.xxxxxxx' // سيعمل الموقع حتى لو تركت هذا طالما الرابط صحيح
    };

    // تغيير اسم المتغير لتجنب التضارب
    const _supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const message = input.value.trim();
        if(!message) return;

        const container = document.getElementById('chat-container');
        container.innerHTML += `<div class="chat-msg"><b>COMMAND_USER:</b> ${message}</div>`;
        
        input.value = '';
        container.scrollTop = container.scrollHeight;

        try {
            // إرسال البيانات للجدول في Supabase
            const { error } = await _supabase.from('messages').insert([{ content: message }]);
            if(error) console.error('Supabase Error:', error.message);
        } catch (err) {
            console.error('System Failure:', err);
        }
    }

    // تحديث الأرقام الحية
    setInterval(() => {
        const score = (96 + Math.random() * 3.5).toFixed(1);
        const el = document.getElementById('live-score');
        if(el) el.innerText = score + "%";
    }, 4000);

    // تفعيل زر Enter
    document.getElementById('user-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>

</body>
</html>
