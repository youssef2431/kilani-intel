
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KILANI INTEL | Financial Intelligence Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #D4AF37;
            --dark-bg: #050505;
            --card-bg: #0a0a0a;
            --glass: rgba(212, 175, 55, 0.1);
            --neon-green: #00ff88;
        }

        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        .navbar {
            padding: 15px 30px;
            border-bottom: 1px solid var(--glass);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.9);
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            color: var(--primary-gold);
            font-size: 1.6rem;
            letter-spacing: 5px;
            font-weight: bold;
        }

        .live-indicator {
            color: var(--neon-green);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .pulse {
            width: 8px;
            height: 8px;
            background: var(--neon-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-green);
            animation: blink 1.5s infinite;
        }

        @keyframes blink { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }

        .main-grid {
            display: grid;
            grid-template-columns: 320px 1fr 300px;
            gap: 20px;
            padding: 20px;
            height: calc(100vh - 80px);
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--glass);
            border-radius: 10px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            color: var(--primary-gold);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 1px;
            margin-bottom: 20px;
            border-left: 3px solid var(--primary-gold);
            padding-left: 10px;
            text-transform: uppercase;
        }

        .price-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: var(--neon-green);
            margin: 10px 0;
        }

        #terminal {
            flex-grow: 1;
            background: #000;
            border: 1px solid #1a1a1a;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: #00ff00;
            overflow-y: auto;
            border-radius: 5px;
        }

        .input-group {
            margin-top: 15px;
            display: flex;
            gap: 10px;
        }

        input {
            flex-grow: 1;
            background: #000;
            border: 1px solid var(--glass);
            color: #fff;
            padding: 12px;
            font-family: 'Orbitron', sans-serif;
            outline: none;
        }

        .btn-execute {
            background: var(--primary-gold);
            color: #000;
            border: none;
            padding: 0 25px;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-execute:hover { background: #fff; }

        .stat-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.9rem;
            border-bottom: 1px solid #111;
            padding-bottom: 8px;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">KILANI INTEL</div>
    <div class="live-indicator">
        <div class="pulse"></div> NETWORK LINK ACTIVE
    </div>
</nav>

<div class="main-grid">
    <section class="card">
        <div class="card-header">Live Market Feed</div>
        <div class="stat-line"><span>BTC/USDT</span> <span id="btc-live" style="color:var(--neon-green)">Connecting...</span></div>
        <div class="stat-line"><span>GOLD/USD</span> <span>$2,384.50</span></div>
        <div class="stat-line"><span>EUR/USD</span> <span>1.0842</span></div>
        
        <div style="margin-top: auto;">
            <div class="card-header">AI Prediction Score</div>
            <div class="price-display" id="ai-confidence">98.2%</div>
        </div>
    </section>

    <main class="card">
        <div class="card-header">Financial Neural Terminal</div>
        <div id="terminal">
            [SYS] Booting KILANI INTEL v1.0...<br>
            [SYS] Secure link to Binance API established.<br>
            [READY] Awaiting automated market commands
