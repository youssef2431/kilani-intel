<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KILANI INTEL | Secure Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --intel-blue: #0088ff; --silver: #d0d8e0; --bg: #000; --panel: #050505; }
        body { background: var(--bg); color: var(--silver); font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        
        /* Auth Overlay */
        #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--panel); border: 1px solid #1a1a1a; padding: 40px; width: 360px; text-align: center; border-radius: 4px; box-shadow: 0 0 40px rgba(0,136,255,0.1); }
        .logo-text { font-family: 'Orbitron'; color: var(--intel-blue); font-size: 1.6rem; margin-bottom: 10px; letter-spacing: 4px; }
        .tagline { font-size: 0.6rem; color: #444; margin-bottom: 30px; letter-spacing: 2px; text-transform: uppercase; }
        
        input { width: 100%; padding: 14px; margin-bottom: 15px; background: #000; border: 1px solid #222; color: var(--intel-blue); font-family: 'JetBrains Mono'; box-sizing: border-box; outline: none; border-radius: 2px; }
        input:focus { border-color: var(--intel-blue); }
        
        .btn { width: 100%; padding: 14px; background: var(--intel-blue); color: #000; border: none; font-family: 'Orbitron'; font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: 0.3s; }
        .btn:hover { background: #fff; }
        .btn-alt { background: transparent; color: var(--intel-blue); border: 1px solid var(--intel-blue); }

        .price-tag { color: #00ff88; font-family: 'Orbitron'; font-size: 0.8rem; margin: 20px 0; display: block; }

        /* Main Dashboard (Hidden) */
        #main-ui { display: none; visibility: hidden; }
        .header { background: #080808; padding: 15px 30px; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; }
        .dashboard { display: grid; grid-template-columns: 320px 1fr; grid-template-rows: 1fr 180px; height: calc(100vh - 60px); gap: 2px; background: #111; }
        .panel { background: var(--bg); border: 1px solid #1a1a1a; padding: 20px; }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <div class="logo-text">KILANI INTEL</div>
        <div class="tagline">Neural Financial Intelligence</div>
        
        <span class="price-tag">7-DAY SESSION: $5.00</span>
        
        <div id="login-fields">
            <input type="email" id="email" placeholder="ACCESS EMAIL">
            <input type="password" id="password" placeholder="SECURE KEY">
            <button class="btn" onclick="signIn()">LOGIN & START SESSION</button>
            <button class="btn btn-alt" onclick="signUp()">REQUEST NEW ACCESS</button>
        </div>
        
        <p style="font-size:0.6rem; color:#333; margin-top:20px;">Secure link via Supabase Encryption</p>
    </div>
</div>

<div id="main-ui">
    <div class="header">
        <div style="font-family:'Orbitron'; color:var(--intel-blue); letter-spacing:3px; font-weight:bold;">KILANI INTEL // ACTIVE</div>
        <div id="session-timer" style="font-family:'JetBrains Mono'; font-size:0.7rem; color:#555;">REMAINING: 167h 59m</div>
        <button onclick="signOut()" style="background:none; border:1px solid #222; color:#444; cursor:pointer; padding:5px 10px; font-size:0.6rem;">TERMINATE SESSION</button>
    </div>
    
    <div class="dashboard">
        <aside class="panel">
            <div style="color:var(--intel-blue); font-size:0.7rem; font-family:'Orbitron'; margin-bottom:20px;">MARKET DATA</div>
            <div id="btc-price" style="font-size:1.4rem; font-family:'Orbitron';">BTC: ...</div>
            <div style="margin-top:20px; font-size:0.8rem; color:#444;">Status: <span style="color:#00ff88;">PROFITABLE</span></div>
        </aside>
        
        <main class="panel" style="display:flex; align-items:center; justify-content:center; color:#1a1a1a;">
            <div style="text-align:center;">
                <div style="font-family:'Orbitron'; font-size:0.8rem; margin-bottom:10px;">NEURAL CHART ENGINE</div>
                <div style="font-size:0.6rem;">[ WAITING FOR MARKET VOLATILITY ]</div>
            </div>
        </main>
        
        <footer class="panel" style="grid-column: 1 / 3;">
            <div style="color:var(--intel-blue); font-size:0.7rem; font-family:'Orbitron'; margin-bottom:10px;">CONSOLE_OUTPUT</div>
            <div id="logs" style="font-family:'JetBrains Mono'; font-size:0.8rem; color:#00ff88;">[SYS] Decrypting feed... Session Verified.</div>
        </footer >
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    // CREDENTIALS FROM YOUR PROVIDED DATA
    const SB_URL = "https://fqplhqwkayssrnnaralw.supabase.co";
    const SB_KEY = "Sb_publishable_3isr2KLB80jo7f_d0-hh2w_qVtAbvEX"; 
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

    async function signUp() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { error } = await supabaseClient.auth.signUp({ email, password });
        if (error) alert("Error: " + error.message);
        else alert("Verification link sent! Check your inbox.");
    }

    async function signIn() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) alert("Access Denied: Check credentials or payment status.");
        else showUI();
    }

    function showUI() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
        document.getElementById('main-ui').style.visibility = 'visible';
        startMarketFeed();
    }

    async function signOut() {
        await supabaseClient.auth.signOut();
        location.reload();
    }

    function startMarketFeed() {
        setInterval(async () => {
            try {
                const r = await fetch('https://api.binance.com/api/3/ticker/price?symbol=BTCUSDT');
                const d = await r.json();
                document.getElementById('btc-price').innerText = "BTC: $" + parseFloat(d.price).toLocaleString();
            } catch(e) {}
        }, 3000);
    }

    // Auto-check session on load
    window.onload = async () => {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) showUI();
    }
</script>
</body>
</html>
